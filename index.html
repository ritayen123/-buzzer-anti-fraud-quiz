<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>反詐小測驗 | Buzzer 蜂任務</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito Sans', sans-serif;
            background: #f5f7f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 480px;
            width: 100%;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header .brand {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 700;
            color: #84AF4D;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .header .brand svg {
            width: 24px;
            height: 24px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            color: #2d2d2d;
            line-height: 1.3;
        }

        .header p {
            font-size: 15px;
            color: #888;
            margin-top: 8px;
        }

        /* Card */
        .card {
            background: #fff;
            border-radius: 20px;
            padding: 32px 24px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        }

        .question-number {
            display: inline-block;
            background: #84AF4D;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            padding: 4px 14px;
            border-radius: 20px;
            margin-bottom: 16px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 700;
            color: #2d2d2d;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        /* Options */
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e8e8e8;
            border-radius: 14px;
            background: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            font-family: 'Nunito Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: #2d2d2d;
            line-height: 1.4;
        }

        .option-btn:hover {
            border-color: #84AF4D;
            background: #f9fcf5;
        }

        .option-btn .label {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #f0f0f0;
            font-size: 14px;
            font-weight: 700;
            color: #666;
            transition: all 0.2s ease;
        }

        .option-btn:hover .label {
            background: #84AF4D;
            color: #fff;
        }

        .option-btn.correct {
            border-color: #84AF4D;
            background: #f2f9e8;
            pointer-events: none;
        }

        .option-btn.correct .label {
            background: #84AF4D;
            color: #fff;
        }

        .option-btn.wrong {
            border-color: #e74c3c;
            background: #fdf2f2;
            pointer-events: none;
        }

        .option-btn.wrong .label {
            background: #e74c3c;
            color: #fff;
        }

        .option-btn.disabled {
            pointer-events: none;
            opacity: 0.5;
        }

        /* Result feedback */
        .feedback {
            margin-top: 20px;
            padding: 16px 20px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            line-height: 1.6;
            display: none;
        }

        .feedback.correct {
            background: #f2f9e8;
            color: #5a8a1e;
            display: block;
        }

        .feedback.wrong {
            background: #fdf2f2;
            color: #c0392b;
            display: block;
        }

        .feedback .icon {
            font-size: 20px;
            margin-right: 6px;
        }

        .feedback .explanation {
            display: block;
            margin-top: 8px;
            font-weight: 400;
            font-size: 14px;
            color: #555;
        }


        /* Loading */
        .loading {
            text-align: center;
            padding: 32px 0;
        }

        .loading .spinner {
            display: inline-block;
            width: 28px;
            height: 28px;
            border: 3px solid #e8e8e8;
            border-top-color: #84AF4D;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        .loading .text {
            display: block;
            margin-top: 12px;
            font-size: 14px;
            color: #aaa;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }


        /* Footer */
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: #aaa;
        }

        .footer a {
            color: #84AF4D;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="brand">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z" fill="#84AF4D"/>
                </svg>
                BUZZER 蜂任務
            </div>
            <h1>反詐小測驗</h1>
            <p>測試你的防詐意識，保護自己不受騙！</p>
        </div>

        <div class="card">
            <div class="question-number">反詐小測驗</div>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <span class="text">題目載入中...</span>
            </div>
            <div class="question-text" id="questionText"></div>
            <div class="options" id="options"></div>
            <div class="feedback" id="feedback"></div>
        </div>

        <div class="footer">
            <p>由 <a href="https://buzzer.global" target="_blank" rel="noopener noreferrer">Buzzer 蜂任務</a> 製作</p>
        </div>
    </div>

    <script>
        // ===== 硬編碼題庫（API 失敗時的 fallback）=====
        var fallbackQuestions = [
            {
                question: "你收到一則簡訊說：「你的包裹無法投遞，請點擊連結確認地址。」你應該怎麼做？",
                options: [
                    "立即點擊連結查看",
                    "不理會，直接到物流官網或 App 查詢",
                    "回覆簡訊詢問詳情",
                    "把連結轉發給朋友幫忙確認"
                ],
                answer: 1,
                explanation: "這是常見的「假包裹」釣魚簡訊。詐騙者透過假連結竊取個資或植入惡意程式。正確做法是直接到物流官網或 App 查詢包裹狀態，切勿點擊不明連結。"
            },
            {
                question: "有人在社群上推薦你一個「穩賺不賠」的投資群組，保證月報酬率 30%，你應該？",
                options: [
                    "馬上加入，機會難得",
                    "先投少量試試看",
                    "認定是詐騙，不予理會",
                    "請對方提供公司執照後再考慮"
                ],
                answer: 2,
                explanation: "「穩賺不賠」和「高額報酬保證」是投資詐騙最典型的話術。合法投資一定有風險，任何保證獲利的說法都是詐騙。請直接忽略並檢舉。"
            },
            {
                question: "你在交友軟體認識一個人，對方說自己在國外工作，聊了一週後開始請你幫忙代收包裹或匯款，你應該？",
                options: [
                    "對方看起來很真誠，幫忙一下沒關係",
                    "只幫一次就好",
                    "拒絕並提高警覺，這是典型的愛情詐騙手法",
                    "要求視訊通話後再決定"
                ],
                answer: 2,
                explanation: "這是典型的「殺豬盤」愛情詐騙。詐騙者會先建立感情信任，再以各種理由要求匯款或代收包裹（可能涉及洗錢）。無論對方看起來多真誠，都不應該幫陌生網友處理金錢。"
            },
            {
                question: "你接到電話，對方自稱是警察，說你的帳戶涉及洗錢案件，要求你把錢轉到「安全帳戶」，你應該？",
                options: [
                    "配合轉帳以證明清白",
                    "提供身分證字號讓對方查證",
                    "掛斷電話，撥打 165 反詐騙專線查證",
                    "請對方傳公文到你的 Email"
                ],
                answer: 2,
                explanation: "警察絕對不會透過電話要求轉帳到「安全帳戶」！這是經典的假冒公務員詐騙。遇到類似電話，請立即掛斷並撥打 165 反詐騙專線查證。"
            },
            {
                question: "你在網路上看到一個名牌包特賣網站，價格只有專櫃的兩折，且要求使用銀行轉帳付款，你應該？",
                options: [
                    "趕快下單，這麼便宜很划算",
                    "先轉少量訂金試試",
                    "不購買，這極可能是一頁式詐騙購物網站",
                    "請賣家提供更多商品照片"
                ],
                answer: 2,
                explanation: "一頁式詐騙購物網站的特徵：價格異常低、只能轉帳、無客服電話、限時搶購壓力。這類網站收錢後不出貨或寄送假貨，請認明官方購物管道。"
            },
            {
                question: "朋友突然透過 LINE 傳訊息說急需借錢，請你匯款到一個你不認識的帳號，你應該？",
                options: [
                    "朋友有難當然要幫，馬上匯款",
                    "先匯一小筆應急",
                    "打電話或當面確認是否為本人，帳號可能被盜",
                    "請他改用其他通訊軟體再說一次"
                ],
                answer: 2,
                explanation: "LINE 帳號被盜用來借錢是非常常見的詐騙手法。即使是認識的人傳訊息，涉及金錢時一定要透過電話或見面確認本人身份，千萬不要直接匯款。"
            },
            {
                question: "你收到一封 Email 說你的銀行帳戶有異常登入，需要點擊連結重新驗證密碼，你應該？",
                options: [
                    "趕快點連結修改密碼",
                    "回覆 Email 詢問客服",
                    "不點擊連結，自行開啟銀行官方 App 或網站檢查帳戶狀態",
                    "轉寄給銀行的客服 Email"
                ],
                answer: 2,
                explanation: "這是釣魚郵件（Phishing），目的是誘導你在假網站輸入帳號密碼。正確做法是不點擊信中任何連結，直接開啟銀行官方 App 或官網確認帳戶狀況。"
            },
            {
                question: "有人在網路上招募「在家輕鬆賺」的工作，只要提供你的銀行帳戶幫忙收款轉帳，就能賺取佣金，你應該？",
                options: [
                    "看起來很輕鬆，試試看",
                    "只提供一個不常用的帳戶",
                    "拒絕，提供帳戶給他人使用可能成為詐騙人頭帳戶",
                    "要求對方先付佣金再提供帳戶"
                ],
                answer: 2,
                explanation: "這是「人頭帳戶」的招募手法。提供帳戶給詐騙集團使用，你不但拿不到佣金，還會成為詐欺幫助犯，面臨刑事責任。任何要你提供帳戶的「工作」都是陷阱。"
            },
            {
                question: "你在 IG 上收到一則訊息，對方說你中了抽獎活動大獎，只需要支付運費就能領取，你應該？",
                options: [
                    "運費不多，付了拿獎品",
                    "詢問獎品內容後再決定",
                    "不予理會，這是假中獎詐騙",
                    "提供地址讓對方寄送"
                ],
                answer: 2,
                explanation: "假中獎詐騙會以「支付運費、稅金、手續費」等名目要你付錢。真正的活動抽獎不會要求得獎者先付費。遇到這種訊息請直接忽略或檢舉。"
            },
            {
                question: "你接到電話，對方說是電信公司客服，表示你的門號即將被停用，需要提供身分證字號來驗證，你應該？",
                options: [
                    "提供身分證字號以免門號被停",
                    "提供部分資料確認",
                    "掛斷電話，自行撥打電信公司官方客服電話確認",
                    "請對方用簡訊發送驗證連結"
                ],
                answer: 2,
                explanation: "電信公司不會主動打電話要求你提供身分證字號。這是典型的假冒客服詐騙，目的是取得你的個資進行身份盜用。如有疑慮，請自行撥打電信公司官方客服確認。"
            }
        ];

        // ===== 設定 =====
        // 部署 Apps Script 後，將網址貼在這裡
        var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx1orjrC2k1hhwauxfkxtGVcIo4KjpQCQ0y-I4VN4F2KLsdX1f1C8MFCzn1Tzkv8j5r1g/exec';
        // 預設取題數（可被 URL 參數 count 覆蓋）
        var DEFAULT_COUNT = 1;

        // ===== URL 參數解析 =====
        var urlParams = new URLSearchParams(window.location.search);
        var requestId = urlParams.get('requestId');
        var successUrlPrefix = urlParams.get('successUrlPrefix');
        var paramTag = urlParams.get('tag') || '';
        var paramCount = parseInt(urlParams.get('count'), 10) || DEFAULT_COUNT;

        var answered = false;
        var currentQuestion = null;

        // ===== 從 API 取題，失敗則 fallback =====
        function fetchQuestions() {
            if (!APPS_SCRIPT_URL) {
                startQuiz(pickFromFallback());
                return;
            }

            var apiUrl = APPS_SCRIPT_URL + '?count=' + paramCount;
            if (paramTag) apiUrl += '&tag=' + encodeURIComponent(paramTag);

            fetch(apiUrl)
                .then(function (res) { return res.json(); })
                .then(function (data) {
                    if (data.questions && data.questions.length > 0) {
                        startQuiz(data.questions[0]);
                    } else {
                        startQuiz(pickFromFallback());
                    }
                })
                .catch(function () {
                    startQuiz(pickFromFallback());
                });
        }

        function pickFromFallback() {
            return fallbackQuestions[Math.floor(Math.random() * fallbackQuestions.length)];
        }

        // ===== 渲染題目 =====
        function startQuiz(question) {
            currentQuestion = question;
            document.getElementById('loading').style.display = 'none';
            document.getElementById('questionText').textContent = currentQuestion.question;

            var optionsEl = document.getElementById('options');
            var labels = ['A', 'B', 'C', 'D'];
            currentQuestion.options.forEach(function (opt, i) {
                var btn = document.createElement('button');
                btn.className = 'option-btn';
                var labelSpan = document.createElement('span');
                labelSpan.className = 'label';
                labelSpan.textContent = labels[i];
                var textSpan = document.createElement('span');
                textSpan.textContent = opt;
                btn.appendChild(labelSpan);
                btn.appendChild(textSpan);
                btn.onclick = function () { selectAnswer(i); };
                optionsEl.appendChild(btn);
            });
        }

        function selectAnswer(index) {
            if (answered) return;
            answered = true;

            var allBtns = document.querySelectorAll('.option-btn');
            var feedbackEl = document.getElementById('feedback');
            var isCorrect = index === currentQuestion.answer;

            allBtns.forEach(function (btn, i) {
                if (i === currentQuestion.answer) {
                    btn.classList.add('correct');
                } else if (i === index && !isCorrect) {
                    btn.classList.add('wrong');
                } else {
                    btn.classList.add('disabled');
                }
            });

            var icon = document.createElement('span');
            icon.className = 'icon';
            var explanation = document.createElement('span');
            explanation.className = 'explanation';
            explanation.textContent = currentQuestion.explanation;

            if (isCorrect) {
                feedbackEl.className = 'feedback correct';
                icon.textContent = '\u2713';
                feedbackEl.appendChild(icon);
                feedbackEl.append(' 答對了！你有很好的防詐意識！');
                feedbackEl.appendChild(explanation);
            } else {
                feedbackEl.className = 'feedback wrong';
                icon.textContent = '\u2717';
                feedbackEl.appendChild(icon);
                feedbackEl.append(' 答錯了！要小心這類詐騙手法喔！');
                feedbackEl.appendChild(explanation);
            }

            // 回答後 1 秒自動跳轉到完成頁（復活），不論對錯
            var targetPrefix = successUrlPrefix || (window.location.origin + '/success');
            setTimeout(function () {
                var href = targetPrefix + '?ts=' + Date.now();
                if (requestId) href += '&requestId=' + encodeURIComponent(requestId);
                window.location.href = href;
            }, 1000);
        }

        fetchQuestions();
    </script>
</body>
</html>
